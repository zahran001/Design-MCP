services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-chakra-ui
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage:z
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qdrant_storage: